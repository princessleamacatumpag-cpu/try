<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Love Letter 💌</title>

<link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600&family=Poppins:wght@300;400&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    background:linear-gradient(135deg,#ffd6e7,#ffe9f3);
    overflow:hidden;
    font-family:'Poppins',sans-serif;
}

/* Floating Hearts */
body::before{
    content:"💖 💕 💗 💞 💓";
    position:absolute;
    font-size:3rem;
    opacity:.15;
    animation:float 15s linear infinite;
}

@keyframes float{
    from{
        transform:translateY(100vh);
    }
    to{
        transform:translateY(-100vh);
    }
}

.container{
    position:relative;
    cursor:pointer;
}

/* Hidden Checkbox */
#open{
    display:none;
}

/* Envelope */
.envelope{
    width:340px;
    height:220px;
    background:#fff;
    position:relative;
    border-radius:0 0 12px 12px;
    box-shadow:0 10px 30px rgba(0,0,0,.15);
    overflow:hidden;
}

/* Flap */
.flap{
    width:0;
    height:0;
    border-left:170px solid transparent;
    border-right:170px solid transparent;
    border-top:120px solid #ff8fb1;
    position:absolute;
    top:0;
    transform-origin:top;
    transition:1s ease;
    z-index:100;
}

/* Heart Seal */
.seal{
    position:absolute;
    top:80px;
    left:50%;
    transform:translateX(-50%);
    font-size:2rem;
    z-index:101;
}

/* Letter */
.letter{
    position:absolute;
    width:300px;
    height:420px;
    background:#fffdf8;
    left:20px;
    top:180px;
    border-radius:12px;
    padding:20px;
    box-shadow:0 10px 20px rgba(0,0,0,.15);
    transition:1.2s ease;
    z-index:1;
    overflow-y:auto;
}

.letter h1{
    font-family:'Dancing Script',cursive;
    color:#ff4d88;
    text-align:center;
    margin-bottom:15px;
    font-size:2.5rem;
}

#typing-text{
    font-family:'Dancing Script',cursive;
    font-size:1.6rem;
    color:#444;
    line-height:1.8;
    text-align:center;
    min-height:180px;
}

#typing-text::after{
    content:"|";
    animation:blink .8s infinite;
}

@keyframes blink{
    50%{
        opacity:0;
    }
}

/* Photos */
.photos{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:10px;
    margin:20px 0;
    opacity:0;
    transition:1.5s ease;
}

.photos.show{
    opacity:1;
}

.photos img{
    width:100%;
    height:120px;
    object-fit:cover;
    border-radius:10px;
    border:3px solid #ffd1dc;
}

.signature{
    margin-top:20px;
    text-align:right;
    font-family:'Dancing Script',cursive;
    font-size:1.8rem;
    color:#ff4d88;
}

/* Open Animation */
#open:checked ~ .envelope .flap{
    transform:rotateX(180deg);
}

#open:checked ~ .letter{
    transform:translateY(-320px);
}

/* Click Area */
.open-btn{
    position:absolute;
    width:340px;
    height:220px;
    z-index:200;
}
</style>
</head>
<body>

<div class="container">

    <input type="checkbox" id="open">

    <label for="open" class="open-btn"></label>

    <div class="letter">

        <h1>My Love ❤️</h1>

        <p id="typing-text"></p>

        <div class="photos">
            <img src="https://images.unsplash.com/photo-1516589178581-6cd7833ae3b2?w=500" alt="">
            <img src="https://images.unsplash.com/photo-1511988617509-a57c8a288659?w=500" alt="">
            <img src="https://images.unsplash.com/photo-1524504388940-b1c1722653e1?w=500" alt="">
            <img src="https://images.unsplash.com/photo-1517841905240-472988babdf9?w=500" alt="">
        </div>

        <p style="text-align:center;">
            You are my favorite chapter, my safest place,
            and the most beautiful part of every day.
        </p>

        <div class="signature">
            Forever Yours 💌
        </div>

    </div>

    <div class="envelope">
        <div class="flap"></div>
        <div class="seal">❤️</div>
    </div>

</div>

<script>
const text =
`Every moment with you feels like a beautiful dream.

Thank you for bringing happiness, warmth, and love into my life.

No matter where life takes us, you will always have a special place in my heart. ❤️`;

const typingElement = document.getElementById("typing-text");
const photos = document.querySelector(".photos");

let i = 0;
let typingStarted = false;

function typeWriter(){

    if(i < text.length){

        if(text.charAt(i) === "\n"){
            typingElement.innerHTML += "<br>";
        }else{
            typingElement.innerHTML += text.charAt(i);
        }

        i++;

        setTimeout(typeWriter,40);

    }else{

        photos.classList.add("show");

    }
}

document.getElementById("open").addEventListener("change",function(){

    if(this.checked && !typingStarted){

        typingStarted = true;

        setTimeout(()=>{
            typeWriter();
        },1200);

    }

});
</script>

</body>
</html>
