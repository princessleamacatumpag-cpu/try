    <style>
        *{
            margine:0;
            padding:0;
            box-sizing:border-box;
            font-family: 'Poppins', sans serif;
        }
        body{
            background: linear gradient(to bottom right, #ffd6e7, #fff0f5);
            overflow-x:hidden;
            color:#444;
        }
        
        .container{
            width:100%;
            min-height:100vh;
            display:flex;
            justify-content:center;
            align items:center;
            flex-direction:column;
            text-alignmrnt:center;
            padding:30px;
        }
        
        h1{
            font-size:3rem;
            color:#ff4f89;
            margin-bottom:15px;
        }
        
        .intro{
            font-size:1.2rem;
            margin-bottom:30px;
        }
        
        button{
            padding:15px 35px;
            border:none;
            border-radius:30px;
            background:#ff4f87;
            color:white;
            font-size:1rem;
            cursor:pointer;
            transition:0.3s;
            box-shadow:0 5px 15px rgba(0,0,0,0.1);
            margin-top:20px
        }
        
        button:hover{
            transform:scale(1.05);
            background:#ff2f72;
        }
        .section{
            display:none;
            max-width:800px;
            width:100%;
            background:white;
            padding:40px;
            border-radius:25px;
            margin-top:40px;
            box-shadow:0 10px 30px rgba(0,0,0,.1);
            animation:fadeIn 1s ease;
        }
         .gallery{
            margin-top:40px;
            display:grid;
            grid-templates-columns:repeat(auto-fit, minmax(180px,1fr));
            gap:15px;
            margin-top:20px;
         }
        
        .gallery img{
            width:100%;
            height:250px;
            object-fit:cover;
            border-radius:20px;
            transition:0.3s;
        }
        
         .gallery img:hover{
            transform:scale(1.03);
        }

        iframe{
            width:100%;
            height:352px;
            border:none;
            border-radius:20px;
            margin-top:20px;
        }

        .letter{
            text-align:left;
            line-height:1.8px;
            font-size:1.1rem;
            white-space:pre-wrap;
            min-height:300px;
        }

        h2{
            color:#ff4f87;
            margin-bottom:20px;
        }
        
        @keyframes fadeIn{
            from{
                opacity:0;
                transform:translateY(20px);
            }
            
            to{
                opcity:1;
                transform:translateY(0);
            }
        }
        
        .hearts{
            position:fixed;
            width:100%;
            height:100%;
            pointer-events:none;
            overflow:hidden;
            top:0;
            left:0;
        }
        
        .heart{
            position:absolute;
            color:#ff7aa8;
            animation:float 6s linear infinite;
            font-size:20px;
        }
        
        @keyframes float{
            from{
                transform:translateY(100vh);
                opacity:1;
            }
            
            to{
                transform:translateY(-10vh);
                opacity:0;
            }
        }
    </style>
/head>
