        }

        iframe{

        .letter{

            white-space:pre-wrap;
            min-height:300px;
        }

        h2{
            color:#ff4f87;
            margin-bottom:20px;
        }
        
        @keyframes fadeIn{
            from{
                opacity:0;
                transform:translateY(20px);
            }
            
            to{
                opcity:1;
                transform:translateY(0);
            }
        }
        
        .hearts{
            position:fixed;
            width:100%;
            height:100%;
            pointer-events:none;
            overflow:hidden;
            top:0;
            left:0;
        }
        
        .heart{
            position:absolute;
            color:#ff7aa8;
            animation:float 6s linear infinite;
            font-size:20px;
        }
        
        @keyframes float{
            from{
                transform:translateY(100vh);
                opacity:1;
            }
            
            to{
                transform:translateY(-10vh);
                opacity:0;
            }
        }
    </style>
/head>
